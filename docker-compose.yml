version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend
    container_name: labourious-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - APP_NAME=${APP_NAME:-Labourious}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - DEBUG=${DEBUG:-false}
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:////app/data/labourious.db
      - VAULT_PASSWORD=${VAULT_PASSWORD}
      - VAULT_SALT=${VAULT_SALT:-labourious-salt-v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - EXCHANGE_TESTNET=${EXCHANGE_TESTNET:-true}
    volumes:
      - labourious-data:/app/data
      - labourious-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:alpine
    container_name: labourious-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  labourious-data:
    driver: local
  labourious-logs:
    driver: local
