<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="1000" fill="#fafafa" rx="8"/>
  
  <!-- Outer walls -->
  <rect x="20" y="20" width="760" height="960" fill="none" stroke="#333" stroke-width="3" stroke-dasharray="12,6" rx="4"/>
  
  <!-- Elevator -->
  <rect x="300" y="40" width="200" height="80" fill="#e8e8e8" stroke="#666" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="400" y="75" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#333">ELEVATOR</text>
  <text x="400" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">to floors 2-4, penthouse</text>
  
  <!-- Research Room (Left, Upper) -->
  <rect x="40" y="180" width="160" height="100" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="120" y="225" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#2d5a8a">RESEARCH</text>
  <text x="120" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Room 1</text>
  
  <!-- Alt Data Room (Right, Upper) -->
  <rect x="600" y="180" width="160" height="100" fill="#f0fff4" stroke="#4a8a5a" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="680" y="225" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#2a6a3a">ALT DATA</text>
  <text x="680" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Room 13</text>
  
  <!-- Reception Desk -->
  <rect x="320" y="200" width="160" height="60" fill="#fff8e8" stroke="#aa8a4a" stroke-width="2" rx="4"/>
  <text x="400" y="235" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#6a5a2a">RECEPTION</text>
  <text x="400" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">desk</text>
  
  <!-- Sentiment Room (Left, Lower) -->
  <rect x="40" y="420" width="160" height="100" fill="#fff0f4" stroke="#8a4a6a" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="120" y="465" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#6a2a4a">SENTIMENT</text>
  <text x="120" y="488" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Room 7</text>
  
  <!-- Storage Room (Right, Lower) -->
  <rect x="600" y="420" width="160" height="100" fill="#f4f0ff" stroke="#6a4a8a" stroke-width="2" stroke-dasharray="8,4" rx="4"/>
  <text x="680" y="465" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#4a2a6a">STORAGE</text>
  <text x="680" y="488" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Room 14</text>
  
  <!-- Waiting Area -->
  <text x="400" y="560" text-anchor="middle" font-family="monospace" font-size="14" fill="#666">— WAITING AREA —</text>
  
  <!-- Chairs (Left cluster) -->
  <rect x="240" y="580" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="280" y="580" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="240" y="620" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="280" y="620" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  
  <!-- Chairs (Right cluster) -->
  <rect x="490" y="580" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="530" y="580" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="490" y="620" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  <rect x="530" y="620" width="30" height="30" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
  
  <!-- Entrance -->
  <rect x="280" y="860" width="120" height="50" fill="#e8e8e8" stroke="#333" stroke-width="2" rx="4"/>
  <text x="340" y="890" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">ENTRANCE</text>
  
  <!-- Entrance Bodyguard -->
  <rect x="460" y="860" width="140" height="50" fill="#ffe8e8" stroke="#aa4a4a" stroke-width="2" stroke-dasharray="6,3" rx="4"/>
  <text x="530" y="882" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8a2a2a">ENTRANCE</text>
  <text x="530" y="898" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8a2a2a">BODYGUARD</text>
  
  <!-- Floor label -->
  <text x="400" y="960" text-anchor="middle" font-family="monospace" font-size="12" fill="#999">GROUND FLOOR — INTAKE</text>
</svg>
